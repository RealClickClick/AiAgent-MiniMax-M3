        function copyMessageText(index) {
            const session = sessions.find(s => s.id === currentSessionId);
            if (!session) return;
            
            let text = session.messages[index].content;
            // Strip think tags
            text = text.replace(/<think>[\s\S]*?(?:<\/think>|$)/g, '').trim();
            
            const trans = TRANSLATIONS[session.language] || TRANSLATIONS.fa;
            
            navigator.clipboard.writeText(text).then(() => {
                showToast(trans.toastCopied);
            }).catch(err => {
                console.error('Copy failed', err);
            });
        }

        function regenerateFromIndex(index) {
            const session = sessions.find(s => s.id === currentSessionId);
            if (!session) return;
            
            // Slice history up to this message
            session.messages = session.messages.slice(0, index);
            saveSessions();
            
            loadSession(currentSessionId);
            sendMessage(true);
        }

        function startEditMessage(index) {
            const wrapper = document.querySelector(`.message-wrapper[data-index="${index}"]`);
            if (!wrapper) return;
            
            const bubble = wrapper.querySelector('.message');
            const session = sessions.find(s => s.id === currentSessionId);
            if (!session) return;
            
            const originalText = session.messages[index].content;
            const trans = TRANSLATIONS[session.language] || TRANSLATIONS.fa;
            
            bubble.innerHTML = `
                <div class="edit-container">
                    <textarea class="edit-textarea" oninput="autoResize(this)">${originalText}</textarea>
                    <div class="edit-buttons">
                        <button class="edit-btn-save" onclick="saveEditedMessage(${index})">${trans.saveAndSend}</button>
                        <button class="edit-btn-cancel" onclick="cancelEdit(${index})">${trans.cancel}</button>
                    </div>
                </div>
            `;
            
            const editTextArea = bubble.querySelector('.edit-textarea');
            autoResize(editTextArea);
            editTextArea.focus();
            
            const actions = wrapper.querySelector('.message-actions');
            if (actions) actions.style.display = 'none';
        }

        function cancelEdit(index) {
            loadSession(currentSessionId);
        }

        function saveEditedMessage(index) {
            const wrapper = document.querySelector(`.message-wrapper[data-index="${index}"]`);
            if (!wrapper) return;
            
            const textarea = wrapper.querySelector('.edit-textarea');
            const newText = textarea.value.trim();
            if (!newText) return;
            
            const session = sessions.find(s => s.id === currentSessionId);
            if (!session) return;
            
            session.messages[index].content = newText;
            // Truncate subsequent messages
            session.messages = session.messages.slice(0, index + 1);
            saveSessions();
            
            loadSession(currentSessionId);
            sendMessage(true);
        }

        function applyLanguageLayout(lang) {
            const messagesBox = document.getElementById('messagesBox');
            const userInput = document.getElementById('userInput');
            
            const trans = TRANSLATIONS[lang] || TRANSLATIONS.fa;
            
            // Translate static elements
            document.getElementById('sidebarTitleText').innerText = trans.recentChats;
            document.getElementById('newChatText').innerText = trans.newChat;
            document.getElementById('searchChats').placeholder = trans.searchPlaceholder;
            document.getElementById('clearAllText').innerText = trans.clearAll;
            document.getElementById('mainTitle').innerText = trans.title;
            document.getElementById('mainSubtitle').innerText = trans.subtitle;
            document.getElementById('exportBtn').title = trans.exportChat;
            document.getElementById('clearChatBtn').title = trans.clearCurrent;
            
            // Translate Select Dropdown Options dynamically with screen size check
            const langSelect = document.getElementById('langSelect');
            const toneSelect = document.getElementById('toneSelect');
            if (langSelect && toneSelect) {
                const isMobile = window.innerWidth <= 480;
                if (lang === 'en') {
                    langSelect.options[0].text = "Persian";
                    langSelect.options[1].text = "English";
                    langSelect.options[2].text = "Auto";
                    
                    toneSelect.options[0].text = "Casual";
                    toneSelect.options[1].text = "Formal";
                    toneSelect.options[2].text = "Creative";
                    toneSelect.options[3].text = "Concise";
                    toneSelect.options[4].text = "Sarcastic";
                    toneSelect.options[5].text = "Robotic";
                    toneSelect.options[6].text = "Fun";
                    toneSelect.options[7].text = "Rude";
                    toneSelect.options[8].text = "Romantic";
                } else {
                    langSelect.options[0].text = isMobile ? "فارسی" : "فارسی (RTL)";
                    langSelect.options[1].text = isMobile ? "English" : "English (LTR)";
                    langSelect.options[2].text = isMobile ? "خودکار" : "خودکار (Auto)";
                    
                    toneSelect.options[0].text = isMobile ? "خودمانی" : "خودمانی (Casual)";
                    toneSelect.options[1].text = isMobile ? "رسمی" : "رسمی (Formal)";
                    toneSelect.options[2].text = isMobile ? "خلاق" : "خلاق (Creative)";
                    toneSelect.options[3].text = isMobile ? "مختصر" : "مختصر (Concise)";
                    toneSelect.options[4].text = isMobile ? "طعنه‌آمیز" : "طعنه‌آمیز (Sarcastic)";
                    toneSelect.options[5].text = isMobile ? "رباتیک" : "رباتیک/بی‌احساس (Robotic)";
                    toneSelect.options[6].text = isMobile ? "سرگرم‌کننده" : "سرگرم‌کننده (Fun)";
                    toneSelect.options[7].text = isMobile ? "بی‌ادبانه" : "بی‌ادبانه (Rude)";
                    toneSelect.options[8].text = isMobile ? "عاشقانه" : "عاشقانه (Romantic)";
                }
            }
            
            // Toggle body class and document dir for LTR/RTL layout direction flip
            if (lang === 'en') {
                document.body.classList.add('ltr-layout');
                userInput.placeholder = trans.userPlaceholder;
                userInput.style.direction = 'ltr';
                messagesBox.style.direction = 'ltr';
            } else if (lang === 'fa') {
                document.body.classList.remove('ltr-layout');
                userInput.placeholder = trans.userPlaceholder;
                userInput.style.direction = 'rtl';
                messagesBox.style.direction = 'rtl';
            } else {
                // Auto mode
                document.body.classList.remove('ltr-layout');
                userInput.placeholder = trans.userPlaceholder;
                userInput.style.direction = 'auto';
                messagesBox.style.direction = 'rtl';
            }
        }

        // Window resize listener to handle dynamic selector label scaling
        window.addEventListener('resize', () => {
            const session = sessions.find(s => s.id === currentSessionId);
            if (session) {
                applyLanguageLayout(session.language);
            }
        });

        function changeSessionLanguage(lang) {
            const session = sessions.find(s => s.id === currentSessionId);
            if (!session) return;
            
            session.language = lang;
            if (!session.tone) {
                const toneSelect = document.getElementById('toneSelect');
                session.tone = toneSelect ? toneSelect.value : 'friendly';
            }
            
            // Update the system prompt
            if (session.messages.length > 0 && session.messages[0].role === 'system') {
                session.messages[0].content = getSystemPromptContent(lang, session.tone);
            }
            
            // Translate the session title if it is default ('New Chat' or 'چت جدید')
            if (session.messages.length === 1) {
                if (lang === 'en' && session.title === 'چت جدید') {
                    session.title = 'New Chat';
                } else if (lang === 'fa' && session.title === 'New Chat') {
                    session.title = 'چت جدید';
                }
            }
            
            saveSessions();
            applyLanguageLayout(lang);
            
            // Update welcome dashboard if empty
            if (session.messages.length === 1) {
                const welcomeDashboard = document.querySelector('.welcome-dashboard');
                if (welcomeDashboard) welcomeDashboard.remove();
                appendGreetingMessage();
            }
            
            const trans = TRANSLATIONS[lang] || TRANSLATIONS.fa;
            showToast(trans.toastLangChanged);
        }

        function changeSessionTone(tone) {
            const session = sessions.find(s => s.id === currentSessionId);
            if (!session) return;
            
            session.tone = tone;
            if (!session.language) {
                const langSelect = document.getElementById('langSelect');
                session.language = langSelect ? langSelect.value : 'fa';
            }
            
            // Update the system prompt
            if (session.messages.length > 0 && session.messages[0].role === 'system') {
                session.messages[0].content = getSystemPromptContent(session.language, tone);
            }
            
            saveSessions();
            
            const trans = TRANSLATIONS[session.language] || TRANSLATIONS.fa;
            showToast(trans.toastToneChanged);
        }

        function getDirectionClass(text) {
            const rtlChars = /[\u0600-\u06FF\u0750-\u077F\u0590-\u05FF\uFE70-\uFEFF]/;
            return rtlChars.test(text) ? 'rtl' : 'ltr';
        }

        function showToast(message) {
            const container = document.getElementById('toastContainer');
            if (!container) return;
            
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" style="margin-left:6px;"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) reverse forwards';
                toast.addEventListener('animationend', () => toast.remove());
            }, 2500);
        }

        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.querySelector('.sidebar-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }

        function filterChats() {
            const query = document.getElementById('searchChats').value.toLowerCase().trim();
            const items = document.querySelectorAll('.chat-item');
            items.forEach(item => {
                const title = item.querySelector('.chat-item-title').textContent.toLowerCase();
                if (title.includes(query)) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        function clearAllSessions() {
            const session = sessions.find(s => s.id === currentSessionId);
            const lang = session ? session.language : 'fa';
            const trans = TRANSLATIONS[lang] || TRANSLATIONS.fa;
            
            if (confirm(trans.confirmClearAll)) {
                sessions = [];
                saveSessions();
                createNewSession();
                showToast(trans.toastClearedAll);
            }
        }

        function clearCurrentChat() {
            const session = sessions.find(s => s.id === currentSessionId);
            if (!session) return;
            const lang = session.language || 'fa';
            const tone = session.tone || 'friendly';
            const trans = TRANSLATIONS[lang] || TRANSLATIONS.fa;
            
            if (confirm(trans.confirmClearCurrent)) {
                session.messages = [{role: 'system', content: getSystemPromptContent(lang, tone)}];
                saveSessions();
                loadSession(currentSessionId);
                showToast(trans.toastClearedCurrent);
            }
        }

        function exportChat() {
            const session = sessions.find(s => s.id === currentSessionId);
            if (!session) return;
            
            const lang = session.language || 'fa';
            const trans = TRANSLATIONS[lang] || TRANSLATIONS.fa;
            
            const cleanMessages = session.messages.map(m => ({
                role: m.role,
                content: m.content
            }));
            
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(cleanMessages, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href",     dataStr);
            downloadAnchor.setAttribute("download", `chat_export_${session.title.replace(/\s+/g, '_')}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
            showToast(trans.toastExported);
        }

        function toggleSendButtonState(isStreaming) {
            const session = sessions.find(s => s.id === currentSessionId);
            const lang = session ? session.language : 'fa';
            const trans = TRANSLATIONS[lang] || TRANSLATIONS.fa;

            if (isStreaming) {
                sendBtn.innerHTML = `
                    <svg viewBox="0 0 24 24" style="transform:none;">
                        <rect x="5" y="5" width="14" height="14" rx="2" />
                    </svg>
                `;
                sendBtn.onclick = stopGeneration;
                sendBtn.disabled = false;
                sendBtn.title = trans.stopGen;
                sendBtn.classList.add('generating');
            } else {
                sendBtn.innerHTML = `
                    <svg viewBox="0 0 24 24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                    </svg>
                `;
                sendBtn.onclick = sendMessage;
                sendBtn.title = trans.sendMsg;
                sendBtn.classList.remove('generating');
            }
        }

        function stopGeneration() {
            if (activeAbortController) {
                activeAbortController.abort();
            }
        }

        function autoResize(textarea) {
            textarea.style.height = '52px';
            const height = Math.min(textarea.scrollHeight, 150);
            textarea.style.height = height + 'px';
            if (textarea.scrollHeight > 150) {
                textarea.style.overflowY = 'auto';
            } else {
                textarea.style.overflowY = 'hidden';
            }
        }

        function handleEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function scrollToBottom() {
            messagesBox.scrollTop = messagesBox.scrollHeight;
        }

        async function sendMessage(isRegenerateOrEdit = false) {
            let text = '';
            if (!isRegenerateOrEdit) {
                text = userInput.value.trim();
                if (!text || !currentSessionId) return;

                const session = sessions.find(s => s.id === currentSessionId);
                
                // Clear welcome dashboard if present
                const welcomeDashboard = document.querySelector('.welcome-dashboard');
                if (welcomeDashboard) welcomeDashboard.remove();

                if (session.messages.length === 1) {
                    session.title = text.substring(0, 30) + (text.length > 30 ? '...' : '');
                    saveSessions();
                }

                appendMessage('user', text, session.messages.length);
                session.messages.push({ role: 'user', content: text });
                saveSessions();
                updateHeaderButtons();
                
                userInput.value = '';
                autoResize(userInput);
            } else {
                const welcomeDashboard = document.querySelector('.welcome-dashboard');
                if (welcomeDashboard) welcomeDashboard.remove();
            }
            
            if (!currentSessionId) return;
            const session = sessions.find(s => s.id === currentSessionId);
            
            sendBtn.disabled = true;
            typingIndicator.classList.add('active');
            messagesBox.appendChild(typingIndicator);
            scrollToBottom();

            activeAbortController = new AbortController();
            toggleSendButtonState(true);

            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper assistant';
            const aiMessageDiv = document.createElement('div');
            aiMessageDiv.className = 'message assistant';
            wrapper.appendChild(aiMessageDiv);
            messagesBox.insertBefore(wrapper, typingIndicator);
            
            let fullResponse = '';

            try {
                const messagesToSend = session.messages.map(m => {
                    let contentToSend = m.content;
                    if (m.role === 'assistant') {
                        contentToSend = contentToSend.replace(/<think>[\s\S]*?(?:<\/think>|$)/g, '').trim();
                    }
                    return {role: m.role, content: contentToSend}; 
                });

                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: messagesToSend }),
                    signal: activeAbortController.signal
                });

                typingIndicator.classList.remove('active');

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');

                let buffer = '';
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();
                    
                    for (const line of lines) {
                        const trimmedLine = line.trim();
                        if (trimmedLine.startsWith('data:') && !trimmedLine.includes('[DONE]')) {
                            try {
                                const dataStr = trimmedLine.substring(5).trim();
                                if (!dataStr) continue;
                                const data = JSON.parse(dataStr);
                                if (data.content) {
                                    fullResponse += data.content;
                                    aiMessageDiv.innerHTML = parseThinkingContent(fullResponse);
                                    
                                    // Update dynamic text direction
                                    const dirClass = getDirectionClass(fullResponse);
                                    aiMessageDiv.className = `message assistant ${dirClass}`;
                                    
                                    scrollToBottom();
                                }
                            } catch (e) {
                                console.error('Error parsing stream:', e, trimmedLine);
                            }
                        }
                    }
                }
                
                session.messages.push({ role: 'assistant', content: fullResponse });
                saveSessions();

                const idx = session.messages.length - 1;
                wrapper.dataset.index = idx;
                
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'message-actions';
                actionsDiv.innerHTML = `
                    <button class="action-btn copy-btn" onclick="copyMessageText(${idx})" title="کپی پیام">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                    </button>
                    <button class="action-btn regen-btn" onclick="regenerateFromIndex(${idx})" title="تلاش مجدد">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 6v3l4-4-4-4v3c-4.42 0-8 3.58-8 8 0 1.57.46 3.03 1.24 4.26L6.7 14.8c-.45-.83-.7-1.79-.7-2.8 0-3.31 2.69-6 6-6zm6.76 1.74L17.3 9.2c.44.84.7 1.79.7 2.8 0 3.31-2.69 6-6 6v-3l-4 4 4 4v-3c4.42 0 8-3.58 8-8 0-1.57-.46-3.03-1.24-4.26z"/></svg>
                    </button>
                `;
                wrapper.appendChild(actionsDiv);

            } catch (error) {
                typingIndicator.classList.remove('active');
                const trans = TRANSLATIONS[session.language] || TRANSLATIONS.fa;
                if (error.name === 'AbortError') {
                    aiMessageDiv.innerHTML += ` <span style="color: var(--text-muted); font-size: 0.82rem;">${trans.userStopped}</span>`;
                    session.messages.push({ role: 'assistant', content: fullResponse + " " + trans.userStopped });
                    saveSessions();
                    
                    const idx = session.messages.length - 1;
                    wrapper.dataset.index = idx;
                    const actionsDiv = document.createElement('div');
                    actionsDiv.className = 'message-actions';
                    actionsDiv.innerHTML = `
                        <button class="action-btn copy-btn" onclick="copyMessageText(${idx})" title="کپی پیام">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                        </button>
                        <button class="action-btn regen-btn" onclick="regenerateFromIndex(${idx})" title="تلاش مجدد">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 6v3l4-4-4-4v3c-4.42 0-8 3.58-8 8 0 1.57.46 3.03 1.24 4.26L6.7 14.8c-.45-.83-.7-1.79-.7-2.8 0-3.31 2.69-6 6-6zm6.76 1.74L17.3 9.2c.44.84.7 1.79.7 2.8 0 3.31-2.69 6-6 6v-3l-4 4 4 4v-3c4.42 0 8-3.58 8-8 0-1.57-.46-3.03-1.24-4.26z"/></svg>
                        </button>
                    `;
                    wrapper.appendChild(actionsDiv);
                } else {
                    const errorMsg = (session.language === 'en') ? 'Error connecting to the server.' : 'خطا در برقراری ارتباط با سرور.';
                    aiMessageDiv.innerHTML = `<span style="color: #ef4444">${errorMsg}</span>`;
                }
            } finally {
                sendBtn.disabled = false;
                activeAbortController = null;
                toggleSendButtonState(false);
                userInput.focus();
            }
        }

        // Initialize
        if (sessions.length === 0) {
            createNewSession();
        } else {
            loadSession(sessions[0].id);
        }

    </script>
</body>
</html>
